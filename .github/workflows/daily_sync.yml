name: Daily Last.fm to YT Music Sync

on:
  schedule:
    # Her gün Türkiye saatiyle gece 03:00'te çalışır (UTC 00:00)
    - cron: '0 0 * * *'
  workflow_dispatch: # Manuel olarak tetiklemek istersen bu buton çıkar

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Create browser.json and .env
      run: |
        echo '${{ secrets.YT_BROWSER_JSON }}' > browser.json
        echo "LASTFM_API_KEY=${{ secrets.LASTFM_API_KEY }}" >> .env
        echo "LASTFM_API_SECRET=${{ secrets.LASTFM_API_SECRET }}" >> .env
        echo "LASTFM_USER=${{ secrets.LASTFM_USER }}" >> .env
        echo "YT_PLAYLIST_ID=${{ secrets.YT_PLAYLIST_ID }}" >> .env

    - name: Run sync script
      run: python main.py